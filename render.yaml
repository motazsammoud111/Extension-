# ═══════════════════════════════════════════════════════════════
# render.yaml — Digital Twin AI sur Render.com
# 2 services séparés : Backend Python + Bridge WhatsApp Node.js
# Pas de Docker — chaque service tourne dans son runtime natif
# ═══════════════════════════════════════════════════════════════

services:

  # ── 1. WhatsApp Bridge (Node.js) ────────────────────────────
  - type: web
    name: digital-twin-bridge
    runtime: node
    region: frankfurt
    plan: free
    rootDir: whatsapp-bridge
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health

    disk:
      name: bridge-auth
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: PORT
        value: "10000"
      # AUTH_DIR: non défini = utilise dossier local .wa_auth (plan free sans disk)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NODE_ENV
        value: production

  # ── 2. Backend FastAPI (Python) ─────────────────────────────
  - type: web
    name: digital-twin-backend
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    disk:
      name: twin-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: MY_NAME
        value: Motaz

      - key: GROQ_API_KEY
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_KEY
        sync: false

      - key: SUPABASE_SERVICE_KEY
        sync: false

      - key: ALLOWED_ORIGINS
        sync: false

      - key: DATA_DIR
        value: /data

      - key: WA_BRIDGE_URL
        value: https://digital-twin-bridge.onrender.com
