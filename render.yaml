# ═══════════════════════════════════════════════════════════════
# render.yaml — Déploiement Digital Twin AI sur Render.com
# Un seul service Docker = Backend Python + Bridge WhatsApp Node.js
# ═══════════════════════════════════════════════════════════════

services:
  - type: web
    name: digital-twin-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: frankfurt
    plan: free

    healthCheckPath: /health

    envVars:
      - key: MY_NAME
        value: Motaz

      - key: GROQ_API_KEY
        sync: false

      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_KEY
        sync: false

      - key: SUPABASE_SERVICE_KEY
        sync: false

      - key: ALLOWED_ORIGINS
        sync: false

      - key: DATA_DIR
        value: /data

      - key: WA_BRIDGE_PORT
        value: "3001"

    disk:
      name: twin-data
      mountPath: /data
      sizeGB: 1
